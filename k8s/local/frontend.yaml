apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: uni-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: uni-rag-frontend:local
          imagePullPolicy: IfNotPresent
          env:
            - name: VITE_API_BASE_URL
              value: http://localhost:8000/api/v1
          ports:
            - containerPort: 5173
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: uni-rag
spec:
  selector:
    app: frontend
  ports:
    - port: 5173
      targetPort: 5173
