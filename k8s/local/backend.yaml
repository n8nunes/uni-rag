apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: uni-rag
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: uni-rag-backend:local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: uni-rag-config
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 750m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: uni-rag
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
